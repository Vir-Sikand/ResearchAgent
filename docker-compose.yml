services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pgvector_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d

  mindsdb:
    image: mindsdb/mindsdb:latest
    container_name: mindsdb
    restart: unless-stopped
    environment:
      MINDSDB_APIS: "http,mysql"     # expose HTTP GUI + MySQL SQL API
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Uncomment to require login to MindsDB (recommended beyond local)
      # MINDSDB_USERNAME: mindsdb
      # MINDSDB_PASSWORD: change_me
    ports:
      - "47334:47334"                # HTTP GUI/API
      - "47335:47335"                # MySQL-compatible SQL API
    volumes:
      - mindsdb_storage:/root/mdb_storage
    depends_on:
      - postgres

  agent-app:
    build: ./agent_app
    container_name: agent_app
    restart: unless-stopped
    env_file: .env
    environment:
      # Reuse the same token the KB uses, but under the name the app expects:
      NIM_API_KEY: ${OPENAI_API_KEY}
      # NIM defaults (override in .env if you like):
      NIM_API_BASE: ${NIM_API_BASE}
      NIM_LLM_MODEL: ${NIM_LLM_MODEL}
      NIM_RERANK_MODEL: ${NIM_RERANK_MODEL}
      NIM_VLM_PARSER_MODEL: ${NIM_VLM_PARSER_MODEL}
      # MindsDB connection (service name on the Docker network):
      MINDSDB_HOST: ${MINDSDB_HOST}
      MINDSDB_PORT: ${MINDSDB_PORT}
      MINDSDB_USER: ${MINDSDB_USER}
      MINDSDB_PASSWORD: ${MINDSDB_PASSWORD}
      KB_NAME: ${KB_NAME}
    ports:
      - "8080:8080"
    depends_on:
      mindsdb:
        condition: service_started

volumes:
  pg_data:
  mindsdb_storage:
